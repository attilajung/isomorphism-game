<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Isomorphism</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <div id="game-container">
        <header>
            <h1>Graph Isomorphism</h1>
            <div id="stats">
                <span>Level: <span id="level">1</span></span>
            </div>
            <div id="controls">
                <button id="submit-btn">Submit Selection</button>
            </div>
        </header>

        <main>
            <div id="instructions">
                <p id="instructions-text">Find the matching graphs.</p>
            </div>
            <div id="options-container">
                <div id="options-grid">
                    <!-- Options will be generated here -->
                </div>
            </div>
        </main>

        <footer>
            <button id="next-level-btn" style="display: none;">Next Level</button>
            <div id="message"></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
